mainSections   = ["post"]
rssFullContent = true
favicon        = "img/avatar.png"

[footer]
    since      = 2026
    customText = ""

[dateFormat]
    published   = ":date_full"
    lastUpdated = ":date_full"

[sidebar]
    compact = false
    emoji   = "📝"
    avatar  = "img/avatar.png"

[article]
    headingAnchor = false
    math          = false
    toc           = true
    readingTime   = true

    [article.list]
        showTags = false

    [article.license]
        enabled = false
        default = "Licensed under CC BY-NC-SA 4.0"

    [article.mermaid]
        look            = "classic"
        lightTheme      = "default"
        darkTheme       = "dark"
        securityLevel   = "strict"
        htmlLabels      = true
        transparentBackground = false

    [article.alertIcon]
        note      = "📝"
        tip       = "💡"
        important = "📌"
        warning   = "⚠️"
        caution   = "🚨"

[widgets]
    homepage = [
        { type = "search" },
        { type = "archives", params = { limit = 5 } },
        { type = "tag-cloud", params = { limit = 10 } },
    ]
    page = [{ type = "toc" }]

[opengraph.twitter]
    site = ""
    card = "summary_large_image"

[colorScheme]
    toggle  = true
    default = "auto"

[imageProcessing]
    autoOrient = false

    [imageProcessing.external]
        timeout = "5s"

    [imageProcessing.content]
        widths  = [800, 1600]
        enabled = true

    [imageProcessing.thumbnail]
        enabled = true

[cookies]
    enabled      = false
    showSettings = true

    [cookies.categories]
        analytics  = true
        functional = true

[comments]
    enabled  = false
    provider = "disqus"